<style>
:root{--brand:#1E5BC6;--accent:#D9744A;--ink:#1A1A1A;--gray:#9AA0A6;}
*{margin:0;box-sizing:border-box;}
html,body{height:100%;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#F5F7FB;color:var(--ink);}
#g{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
.box{width:380px;max-width:88vw;background:#fff;border-radius:16px;box-shadow:0 18px 50px rgba(28,61,29,.12);padding:40px 36px;text-align:center;}
.bn{font-size:34px;font-weight:900;letter-spacing:-.02em;}

input{width:100%;font-size:16px;padding:13px 14px;border:1.5px solid #E3E6EB;border-radius:10px;outline:none;text-align:center;}

button{width:100%;margin-top:14px;font-size:16px;font-weight:700;padding:13px;border:none;border-radius:10px;background:var(--brand);color:#fff;cursor:pointer;}
button:hover{background:#1a51b0;}
.err{color:var(--accent);font-size:13px;margin-top:14px;min-height:18px;font-weight:700;}
.foot{font-size:11px;color:var(--gray);margin-top:20px;}
</style></head><body>

const b2u=b=>Uint8Array.from(atob(b),c=>c.charCodeAt(0));
async function open(pw){
  const raw=b2u(BLOB), salt=raw.slice(0,16), iv=raw.slice(16,28), data=raw.slice(28);
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,data);
  return new TextDecoder().decode(pt);
}
