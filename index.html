<style>
:root{--brand:#1E5BC6;--accent:#D9744A;--ink:#1A1A1A;--gray:#9AA0A6;}
*{margin:0;box-sizing:border-box;}

#g{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}

button:hover{background:#1a51b0;}
.err{color:var(--accent);font-size:13px;margin-top:14px;min-height:18px;font-weight:700;}
.foot{font-size:11px;color:var(--gray);margin-top:20px;}

async function open(pw){
  const raw=b2u(BLOB), salt=raw.slice(0,16), iv=raw.slice(16,28), data=raw.slice(28);
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
