<style>
:root{--brand:#1E5BC6;--accent:#D9744A;--ink:#1A1A1A;--gray:#9AA0A6;}
*{margin:0;box-sizing:border-box;}
html,body{height:100%;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#F5F7FB;color:var(--ink);}
#g{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}

button{width:100%;margin-top:14px;font-size:16px;font-weight:700;padding:13px;border:none;border-radius:10px;background:var(--brand);color:#fff;cursor:pointer;}
button:hover{background:#1a51b0;}
.err{color:var(--accent);font-size:13px;margin-top:14px;min-height:18px;font-weight:700;}
.foot{font-size:11px;color:var(--gray);margin-top:20px;}
</style></head><body>

async function open(pw){
  const raw=b2u(BLOB), salt=raw.slice(0,16), iv=raw.slice(16,28), data=raw.slice(28);
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
